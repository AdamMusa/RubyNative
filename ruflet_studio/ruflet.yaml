app:
  name: ruflet_studio
  display_name: Ruflet Studio
  package_name: ruflet_studio
  organization: com.example
  version: 1.0.0+1
  description: A new Ruflet app.
  # Required for server-driven builds: `ruflet build ios`, `apk`, `web`, etc. without `--self`.
  # Example: https://api.example.com
  backend_url: ""

# Source of truth for Flutter client extensions/plugins.
# Ruflet Studio demos these services and extension-backed controls.
services:
  - accelerometer
  - audio
  - audio_recorder
  - barometer
  - battery
  - browser_context_menu
  - camera
  - charts
  - clipboard
  - connectivity
  - file_picker
  - flashlight
  - geolocator
  - gyroscope
  - map
  - magnetometer
  - permission_handler
  - screen_brightness
  - screenshot
  - secure_storage
  - semantics_service
  - shake_detector
  - share
  - storage_paths
  - tester
  - user_accelerometer
  - video
  - webview
  - window

# Build assets configuration consumed by `ruflet build`.
# Paths are relative to this file unless absolute.
assets:
  dir: assets
  splash_screen: assets/splash.png
  icon_launcher: assets/icon.png

build:
  splash_color: "#FFFFFF"
  splash_dark_color: "#0B0B0B"
  icon_background: "#FFFFFF"
  theme_color: "#FFFFFF"
